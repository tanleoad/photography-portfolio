    <div class="story-media s-stillness" style="background-image:url('images/souq-al-mina-arches.jpg')"></div>
    <div class="story-media s-colour" style="background-image:url('images/blossom-terrace.jpg')"></div>
    <div class="chero-scrim"></div>
  </div>

  <div class="chero-content">
    <ul class="chero-list">
      <li class="story-row">
        <a href="projects.html" class="story-link s-light">
          <span class="story-title">Light</span>
        </a>
        <img class="story-media-m" src="images/louvre-abudhabi.jpg" alt="Dappled light beneath the Louvre Abu Dhabi dome" loading="lazy">
      </li>
      <li class="story-row">
        <a href="projects.html" class="story-link s-people">
          <span class="story-title">People</span>
        </a>
        <img class="story-media-m" src="images/corniche-beach-skyline.jpg" alt="Figures along the Corniche with the Abu Dhabi skyline behind" loading="lazy">

      <li class="story-row">
        <a href="projects.html" class="story-link s-motion">
          <span class="story-title">Motion</span>

      </li>
      <li class="story-row">
        <a href="projects.html" class="story-link s-stillness">
          <span class="story-title">Stillness</span>
        </a>
        <img class="story-media-m" src="images/souq-al-mina-arches.jpg" alt="Quiet arched corridor at Souq Al Mina" loading="lazy">
      </li>
      <li class="story-row">
        <a href="projects.html" class="story-link s-colour">
          <span class="story-title">Colour</span>
        </a>
        <img class="story-media-m" src="images/blossom-terrace.jpg" alt="Candid restaurant scene framed through blossoming branches" loading="lazy">
      </li>
    </ul>
